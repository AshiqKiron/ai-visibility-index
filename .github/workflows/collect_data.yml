    # NEW STEP: Verify data was actually generated
    - name: Verify Database Contents
      run: |
        echo "🔍 Checking database contents..."
        python -c "
        import sqlite3, sys
        try:
            conn = sqlite3.connect('data/processed/citations.db')
            count = conn.execute('SELECT COUNT(*) FROM citations').fetchone()[0]
            cols = [desc[0] for desc in conn.execute('PRAGMA table_info(citations)').fetchall()]
            print(f'✅ Database contains {count} citation records')
            print(f' Columns: {cols}')
            if count == 0:
                print('❌ ERROR: Database is empty! Collector produced no data.')
                sys.exit(1)
            if 'prompt_type' not in cols:
                print(' ERROR: Missing prompt_type column in database!')
                sys.exit(1)
            conn.close()
        except Exception as e:
            print(f'❌ Database check failed: {e}')
            sys.exit(1)
        "
