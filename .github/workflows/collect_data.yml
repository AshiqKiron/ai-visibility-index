name: Daily AI Data Collection

on:
  schedule:
    # Runs once daily at 12:00 PM UTC to avoid triggering constant Streamlit rebuilds
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

# Prevent overlapping runs that cause push conflicts and redeploy loops
concurrency:
  group: data-collection-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    
    # ✅ CRITICAL: Grants write access to push data back to main branch
    permissions:
      contents: write
    
    steps:
    # 1. Checkout Repository with full history
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    # 2. Setup Python Environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    # 3. Install Dependencies (sqlite3 removed as it's built-in)
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    # 4. Install Playwright Browsers & System Deps
    - name: Install Playwright Chromium
      run: |
        playwright install chromium
        playwright install-deps chromium
        
    # 5. Run Data Collectors
    - name: Execute AI Scrapers
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        echo "🚀 Starting data collection..."
        python src/collectors/run_all_collectors.py
        echo "✅ Collection complete."
        
    # 6. Process & Calculate Metrics
    - name: Analyze Volatility & Enrich Data
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        echo " Calculating flicker rates and authority scores..."
        python analysis/volatility_metrics.py
        python src/enrichers/authority_scorer.py
        echo "✅ Analysis complete."
        
    # 7. Commit & Push Updated Data Safely
    - name: Commit and Push Results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # Only stage processed data files
        git add data/processed/citations.db
        git add data/processed/metrics_summary.csv
        
        # Skip commit if no changes detected
        if git diff --staged --quiet; then
          echo "ℹ️ No changes detected in data files. Skipping push."
        else
          git commit -m "🤖 Auto-update: AI citation data $(date +'%Y-%m-%d %H:%M')"
          
          # Pull first to prevent conflicts with concurrent pushes
          git pull --rebase origin main
          git push origin main
          echo "✅ Data successfully pushed to repository."
        fi
